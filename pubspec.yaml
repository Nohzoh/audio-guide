name: audio_guide
description: AI-powered audio guide with local and cloud model support
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  camera: ^0.10.5+9
  just_audio: ^0.9.36
  dio: ^5.4.3+1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_tts: ^4.0.2
  google_generative_ai: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
