name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Bootstrap Flutter project
        run: flutter create --project-name audio_guide --org com.audioguide --platforms android .

      - name: Show generated build.gradle
        run: cat android/app/build.gradle

      - name: Fix Android SDK versions
        run: |
          python3 - <<'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          print("BEFORE:")
          print(content)

          content = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 24', content)
          content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', content)
          content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 36', content)
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', content)
          content = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 36', content)
          content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 36', content)

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("AFTER:")
          print(content)
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors on failure
        if: failure()
        run: |
          echo "## Build errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: audio-guide-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
