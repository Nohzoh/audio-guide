name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Flutter 3.32.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'

      - name: Bootstrap Flutter project
        run: flutter create --project-name audio_guide --org com.audioguide --platforms android .

      - name: Patch Android config
        run: |
          python3 - <<'PYEOF'
          import re, os, glob

          # --- Patch app/build.gradle ---
          # Flutter 3.32 generates declarative plugins block format
          build_gradle = 'android/app/build.gradle'
          if os.path.exists(build_gradle):
              with open(build_gradle, 'r') as f:
                  content = f.read()

              # Set minSdk, targetSdk, compileSdk
              content = re.sub(r'minSdk\s*=?\s*\d+', 'minSdk = 26', content)
              content = re.sub(r'targetSdk\s*=?\s*\d+', 'targetSdk = 35', content)
              content = re.sub(r'compileSdk\s*=?\s*\d+', 'compileSdk = 35', content)
              content = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 26', content)
              content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 35', content)
              content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 35', content)

              # Add our dependencies before the last closing brace
              extra_deps = """
          dependencies {
              implementation("com.google.mediapipe:tasks-genai:0.10.14")
              implementation("com.google.mlkit:genai-prompt:1.0.0-beta1")
              implementation("com.google.guava:guava:32.1.3-android")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.9.0")
              implementation("com.google.android.gms:play-services-location:21.3.0")
          }
          """
              if 'tasks-genai' not in content:
                  content += extra_deps

              with open(build_gradle, 'w') as f:
                  f.write(content)
              print("✅ app/build.gradle patched")
              print(content[:800])

          # --- Patch settings.gradle for Kotlin version ---
          for path in ['android/settings.gradle', 'android/build.gradle']:
              if not os.path.exists(path): continue
              with open(path, 'r') as f:
                  c = f.read()
              c = re.sub(r'(id "org.jetbrains.kotlin.android" version ")[^"]*(")', r'\g<1>2.2.0\2', c)
              c = re.sub(r'(ext\.kotlin_version\s*=\s*")[^"]*(")', r'\g<1>2.2.0\2', c)
              with open(path, 'w') as f:
                  f.write(c)
              print(f"✅ Patched Kotlin 2.2.0 in {path}")
          PYEOF

      - name: Patch AndroidManifest
        run: |
          python3 - <<'PYEOF'
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest_path, 'r') as f:
              content = f.read()
          permissions = """
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
          """
          provider = """
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="${applicationId}.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                  <meta-data
                      android:name="android.support.FILE_PROVIDER_PATHS"
                      android:resource="@xml/file_paths"/>
              </provider>
          """
          import re
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('<application', permissions + '\n    <application', 1)
          if 'FileProvider' not in content:
              content = content.replace('</application>', provider + '\n</application>')
          content = re.sub(r'android:label="[^"]*"', 'android:label="AudioLens"', content)
          with open(manifest_path, 'w') as f:
              f.write(content)
          print("✅ Manifest patched")
          PYEOF

      - name: Create FileProvider paths
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="."/>
              <cache-path name="cache" path="."/>
          </paths>
          XML

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/audiolens.jks
          cat > android/key.properties << 'PROPS'
          storeFile=audiolens.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          PROPS
          echo "✅ Keystore configured"

      - name: Patch signing into build.gradle
        run: |
          python3 - <<'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          if 'keystoreProperties' not in content:
              signing = """
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          """
              signing_config = """
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
          """
              # Insert before android {
              content = content.replace('android {', signing + '\nandroid {\n' + signing_config, 1)
              content = content.replace('signingConfig = signingConfigs.debug', 'signingConfig = signingConfigs.release')
              content = content.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release')

              with open('android/app/build.gradle', 'w') as f:
                  f.write(content)
              print("✅ Signing configured")
          else:
              print("ℹ️ Signing already configured")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors on failure
        if: failure()
        run: |
          echo "## Build errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AudioLens-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
