name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Bootstrap Flutter project
        run: flutter create --project-name audio_guide --org com.audioguide --platforms android .

      - name: Patch Kotlin to 2.2.0
        run: |
          python3 - <<'PYEOF'
          import re, os
          for path in ['android/settings.gradle', 'android/build.gradle']:
              if not os.path.exists(path): continue
              with open(path, 'r') as f:
                  content = f.read()
              content = re.sub(r'(id "org.jetbrains.kotlin.android" version ")[^"]*(")', r'\g<1>2.2.0\2', content)
              content = re.sub(r'(ext\.kotlin_version\s*=\s*")[^"]*(")', r'\g<1>2.2.0\2', content)
              with open(path, 'w') as f:
                  f.write(content)
              print(f"✅ Patched {path}")
          PYEOF

      - name: Patch AndroidManifest with permissions
        run: |
          python3 - <<'PYEOF'
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest_path, 'r') as f:
              content = f.read()
          permissions = """
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
          """
          provider = """
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="${applicationId}.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                  <meta-data
                      android:name="android.support.FILE_PROVIDER_PATHS"
                      android:resource="@xml/file_paths"/>
              </provider>
          """
          content = content.replace('<application', permissions + '\n    <application', 1)
          content = content.replace('</application>', provider + '\n</application>')
          with open(manifest_path, 'w') as f:
              f.write(content)
          print("✅ Manifest patched")
          PYEOF

      - name: Set app name to AudioLens
        run: |
          sed -i 's/android:label="[^"]*"/android:label="AudioLens"/' android/app/src/main/AndroidManifest.xml
          echo "✅ App name set to AudioLens"

      - name: Create FileProvider paths
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="."/>
              <cache-path name="cache" path="."/>
          </paths>
          XML

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/audiolens.jks
          echo "storeFile=audiolens.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "✅ Keystore configured"

      - name: Patch build.gradle for signing
        run: |
          python3 - <<'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          """

          signing_block = """
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
          """

          # Add keystore properties loader before android block
          if 'keystoreProperties' not in content:
              content = content.replace(
                  "apply plugin: 'com.android.application'",
                  "apply plugin: 'com.android.application'\n" + signing_config
              )
              # Add signingConfigs block and use it in release
              content = content.replace(
                  'android {',
                  'android {\n' + signing_block
              )
              content = content.replace(
                  'signingConfig signingConfigs.debug',
                  'signingConfig signingConfigs.release'
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("✅ build.gradle patched for signing")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors on failure
        if: failure()
        run: |
          echo "## Build errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AudioLens-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
