name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Bootstrap Flutter project
        run: flutter create --project-name audio_guide --org com.audioguide --platforms android .

      - name: Fix Android SDK versions
        run: |
          sed -i 's/minSdkVersion 21/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/' android/app/build.gradle
          echo "=== build.gradle after fix ==="
          grep -E "minSdk|compileSdk|targetSdk" android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors on failure
        if: failure()
        run: |
          echo "## Build errors" >> $GITHUB_STEP_SUMMARY
          grep -i "error\|Error\|exception\|Because\|failed" build_output.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: audio-guide-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
