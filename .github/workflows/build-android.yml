name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'config.json'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'config.json'
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36 + NDK 27
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "ndk;26.3.11579264"

      - name: Setup Flutter 3.32.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'

      - name: Bootstrap Flutter project
        run: flutter create --project-name audio_guide --org com.audioguide --platforms android .

      - name: Patch build.gradle.kts
        run: |
          FILE="android/app/build.gradle.kts"
          [ ! -f "$FILE" ] && FILE="android/app/build.gradle"
          echo "Patching $FILE"

          # Replace full lines containing flutter.xxxSdkVersion or plain numbers
          sed -i 's|^\s*compileSdk\s*=.*|    compileSdk = 36|' $FILE
          sed -i 's|^\s*minSdk\s*=.*|        minSdk = 26|' $FILE
          sed -i 's|^\s*targetSdk\s*=.*|        targetSdk = 36|' $FILE
          sed -i 's|^\s*compileSdkVersion\s.*|    compileSdkVersion 36|' $FILE
          sed -i 's|^\s*minSdkVersion\s.*|        minSdkVersion 26|' $FILE
          sed -i 's|^\s*targetSdkVersion\s.*|        targetSdkVersion 36|' $FILE

          # Add ndkVersion after compileSdk line
          # Set ndkVersion - replace entire line or add after compileSdk
          if grep -q 'ndkVersion' $FILE; then
            sed -i 's/ndkVersion = "[^"]*"/ndkVersion = "27.0.12077973"/' $FILE
          else
            # Add ndkVersion
          if grep -q ndkVersion $FILE; then
            sed -i 's|ndkVersion = ".*"|ndkVersion = "27.0.12077973"|' $FILE
          else
            echo '        ndkVersion = "27.0.12077973"' >> $FILE
            sed -i '/compileSdk = 36/{n;s/.*/        ndkVersion = "27.0.12077973"/}' $FILE
          fi
          fi

          # Add our dependencies at end of file
          if ! grep -q 'tasks-genai' $FILE; then
            cat >> $FILE << 'DEPS'

          dependencies {
              implementation("com.google.mediapipe:tasks-genai:0.10.14")
              implementation("com.google.mlkit:genai-prompt:1.0.0-beta1")
              implementation("com.google.guava:guava:32.1.3-android")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.9.0")
              implementation("com.google.android.gms:play-services-location:21.3.0")
          }
          DEPS
          fi

          echo "=== Patched file ==="
          cat $FILE

      - name: Patch Kotlin version
        run: |
          for f in android/settings.gradle android/settings.gradle.kts android/build.gradle android/build.gradle.kts; do
            [ -f "$f" ] && sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "2.2.0"/' $f && echo "✅ Patched $f"
            [ -f "$f" ] && sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "2.2.0"/' $f
          done

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'ACCESS_FINE_LOCATION' $MANIFEST; then
            sed -i 's/<application/<uses-permission android:name="android.permission.CAMERA"\/>\n    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"\/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"\/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"\/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"\/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"\/>\n    <application/' $MANIFEST
          fi
          sed -i 's/android:label="[^"]*"/android:label="AudioLens"/' $MANIFEST
          # Enable Auto Backup to Google Drive
          sed -i 's/android:label="AudioLens"/android:label="AudioLens" android:allowBackup="true" android:backupAgent="androidx.work.impl.background.systemjob.SystemJobService" android:fullBackupContent="true"/' $MANIFEST || true
          # Simpler: just set allowBackup=true
          sed -i 's/android:allowBackup="false"/android:allowBackup="true"/' $MANIFEST || true
          grep -q 'allowBackup' $MANIFEST || sed -i 's/android:label="AudioLens"/android:label="AudioLens" android:allowBackup="true"/' $MANIFEST
          echo "✅ Manifest patched"

      - name: Add FileProvider
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'FileProvider' $MANIFEST; then
            sed -i 's|</application>|    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths"/></provider>\n    </application>|' $MANIFEST
          fi
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="."/>
              <cache-path name="cache" path="."/>
          </paths>
          XML
          echo "✅ FileProvider configured"

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/audiolens.jks
          cat > android/key.properties << EOF
          storeFile=audiolens.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          EOF
          echo "✅ Keystore ready"

      - name: Patch signing in build.gradle.kts
        run: |
          FILE="android/app/build.gradle.kts"
          [ ! -f "$FILE" ] && FILE="android/app/build.gradle"
          python3 scripts/patch_signing.py "$FILE"
          echo "Done"

      - name: Debug - show gradle after signing
        run: |
          echo "=== build.gradle.kts ==="
          cat android/app/build.gradle.kts
          echo "=== key.properties ==="
          cat android/key.properties 2>/dev/null || echo "NOT FOUND"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors on failure
        if: failure()
        run: |
          echo "## Build errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AudioLens-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
